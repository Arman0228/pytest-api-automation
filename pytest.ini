[pytest]
addopts = -s -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Smoke tests — critical happy paths
    regression: Full regression suite
    positive: Positive scenarios (happy path)
    negative: Negative scenarios (validation, security, errors)
    auth: Authentication and authorization tests
    security: Security-related negative tests
